# Dedicated unprivileged user for the virani.service unit. Install as
# /etc/sysusers.d/virani.conf and apply with systemd-sysusers. The user also
# needs read access to every PCAP set path (a group membership or ACL on
# wherever your FPC writes).
u virani - "Virani remote PCAP fetch/search service" /var/cache/virani /usr/sbin/nologin
